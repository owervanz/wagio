<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 800px; height: 800px; background: #000; display: flex; align-items: center; justify-content: center; font-family: 'Inter', system-ui, sans-serif; }
  .container {
    width: 800px;
    height: 800px;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .glow {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(153,69,255,0.3) 0%, transparent 70%);
    filter: blur(40px);
  }
  .glow2 {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(20,241,149,0.2) 0%, transparent 70%);
    filter: blur(30px);
    transform: translate(100px, 80px);
  }
  .icon {
    width: 140px;
    height: 140px;
    border-radius: 32px;
    background: linear-gradient(135deg, #14F195 0%, #9945FF 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 72px;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 60px rgba(153,69,255,0.4);
  }
  .title {
    font-size: 88px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -4px;
    position: relative;
    z-index: 1;
    line-height: 1;
  }
  .subtitle {
    font-size: 22px;
    color: #666;
    margin-top: 16px;
    position: relative;
    z-index: 1;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .dot {
    display: inline-block;
    background: linear-gradient(135deg, #14F195, #9945FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="glow"></div>
    <div class="glow2"></div>
    <div class="icon">💸</div>
    <div class="title">wagio<span class="dot">.</span></div>
    <div class="subtitle">Pay · Receive · Done</div>
  </div>
</body>
</html>
